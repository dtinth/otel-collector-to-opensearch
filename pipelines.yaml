entry-pipeline:
  source:
    otel_trace_source:
      ssl: false
  processor:
    - trace_peer_forwarder:
  sink:
    - pipeline:
        name: span-pipeline
    - pipeline:
        name: service-map-pipeline

span-pipeline:
  source:
    pipeline:
      name: entry-pipeline
  processor:
    - otel_traces:
  sink:
    - opensearch:
        hosts: ["${OPENSEARCH_ENDPOINT}"]
        username: "${OPENSEARCH_USERNAME}"
        password: "${OPENSEARCH_PASSWORD}"
        index_type: trace-analytics-raw

service-map-pipeline:
  source:
    pipeline:
      name: entry-pipeline
  processor:
    - service_map:
  sink:
    - opensearch:
        hosts: ["${OPENSEARCH_ENDPOINT}"]
        username: "${OPENSEARCH_USERNAME}"
        password: "${OPENSEARCH_PASSWORD}"
        index_type: trace-analytics-service-map
