receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024
  memory_limiter:
    check_interval: 1s
    limit_percentage: 75

exporters:
  debug:
    verbosity: basic
  # OpenSearch exporter - writes traces as documents
  opensearch:
    endpoints:
      - ${OPENSEARCH_ENDPOINT}
    auth:
      authenticator: basicauth
    # Traces will be written to: traces-*, traces-span-*, traces-service-*
    index: traces
    # Enable trace analytics
    trace_analytics:
      enabled: true

extensions:
  basicauth:
    client_auth:
      username: ${OPENSEARCH_USERNAME}
      password: ${OPENSEARCH_PASSWORD}

service:
  extensions: [basicauth]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [opensearch]
